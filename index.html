<!DOCTYPE html>
<html>

<head>
   <title>Shopping Cart</title>
   <meta charset="utf-8">
   <meta name="viewport" content="width=device-width, initial-scale=1">
   <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.0.0/css/bootstrap.min.css">
   <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.11.2/css/all.css" rel="stylesheet" />
   <link href="style.css" rel="stylesheet">
</head>

<body>

   <section>
      <div class="container">
         <div class="cart">
            <div class="col-md-12 col-lg-10 mx-auto">
               <div class="cart-item">
                  <div class="row">
                     <div class="col-md-7 center-item">
                        <img src="images/product-1.png" alt="">
                        <h5>iPhone 11 128GB Black</h5>
                     </div>

                     <div class="col-md-5 center-item">
                        <div class="input-group number-spinner">
                           <button id="mblMinus" class="btn btn-default"><i class="fas fa-minus"></i></button>
                           <input id="mblAmount" type="text" class="form-control text-center" value="1">
                           <button id="mblPlus" class="btn btn-default"><i class="fas fa-plus"></i></button>
                        </div>
                        <h5>$ <span id="mblPrice">1219</span></h5>
                        <img src="images/remove.png" alt="" class="remove-item">
                     </div>
                  </div>
               </div>

               <div class="cart-item">
                  <div class="row">
                     <div class="col-md-7 center-item mx-auto">
                        <img src="images/product-2.png" alt="">
                        <h5>iPhone 11 Silicone Case - Black</h5>
                     </div>
                     <div class="col-md-5 center-item">
                        <div class="input-group number-spinner">
                           <button id="caseMinus" class="btn btn-default"><i class="fas fa-minus"></i></button>
                           <input id="caseAmount" type="text" class="form-control text-center" value="1">
                           <button id="casePlus" class="btn btn-default"><i class="fas fa-plus"></i></button>

                        </div>
                        <h5>$ <span id="cPrice" >59</span></h5>
                        <img src="images/remove.png" alt="" class="remove-item">
                     </div>
                  </div>
               </div>

               <div class="cart-item">
                  <div class="row">

                     <div class="col-md-8">
                        <h5>Subtotal: </h5>
                        <h5>Tax:</h5>
                        <h5>Total:</h5>
                     </div>

                     <div class="col-md-4 status">
                        <h5>$ <span id="subtotal">1278</span></h5>
                        <h5>$0</h5>
                        <h5>$ <span id="total">1278</span></h5>
                     </div>
                  </div>
               </div>
               <div class="col-md-12 pt-4 pb-4">
                  <button type="button" class="btn btn-success check-out">Check Out</button>
               </div>
            </div>
         </div>
      </div>
   </section>

   <!--Javascript-->
   <script>
      //Start Mobile

      //Mobile plus Button
      const mplusBtn = document.getElementById("mblPlus");
      mplusBtn.addEventListener("click",function(){
         const mblquanti = document.getElementById("mblAmount").value;
         const mblquantity = parseFloat(mblquanti);
         const totalMbl = mblquantity + 1;
         document.getElementById("mblAmount").value = totalMbl;

         const moblprice = document.getElementById("mblPrice").innerText;
         const mobilPrice = parseFloat(moblprice);
         const totalmblPrice = mobilPrice + 1219;
         document.getElementById("mblPrice").innerText = totalmblPrice;

         const subTotal =  document.getElementById("subtotal").innerText;
         const sbTotal = parseFloat(subTotal);
         const SubTotal = sbTotal+1219;
         document.getElementById("subtotal").innerText = SubTotal;

         const Total =  document.getElementById("total").innerText;
         const ToTal = parseFloat(Total);
         const TotaL = ToTal+1219;
         document.getElementById("total").innerText = TotaL;
      })

      //Mobile Minus Button
      const mminusBtn = document.getElementById("mblMinus");
      mminusBtn.addEventListener("click", function(){
         const mblquanti = document.getElementById("mblAmount").value;
         const mblquantity = parseFloat(mblquanti);
         const totalMbl = mblquantity - 1;
         document.getElementById("mblAmount").value = totalMbl;
         if(mblAmount.value <= 0){
            mblAmount.value = 0;
         } 

         const moblprice = document.getElementById("mblPrice").innerText;
         const mobilPrice = parseFloat(moblprice);
         const totalmblPrice = mobilPrice - 1219;
         document.getElementById("mblPrice").innerText = totalmblPrice;  
         if(mblPrice.innerText <= 0){
            mblPrice.innerText = 0;
         }

         const subTotal =  document.getElementById("subtotal").innerText;
         const sbTotal = parseFloat(subTotal);
         const SubTotal = sbTotal-1219;
         document.getElementById("subtotal").innerText = SubTotal;
         if(subtotal.innerText <= 0 || mblAmount.value <= 0){
            subtotal.innerText = cPrice.innerText;
         }

         const Total =  document.getElementById("total").innerText;
         const ToTal = parseFloat(Total);
         const TotaL = ToTal-1219;
         document.getElementById("total").innerText = TotaL;
         if(total.innerText <= 0 || mblAmount.value <= 0){
            total.innerText = cPrice.innerText;
         }  
               
      })
      //End Mobile
      //Start Case

      //Case plus Btn
      const cplusBtn = document.getElementById("casePlus");
      cplusBtn.addEventListener("click",function(){
         const casequanti = document.getElementById("caseAmount").value;
         const casequantity = parseFloat(casequanti);
         const totalCase = casequantity + 1;
         document.getElementById("caseAmount").value = totalCase;

         const caseprice = document.getElementById("cPrice").innerText;
         const casPrice = parseFloat(caseprice);
         const totalcasePrice = casPrice + 59;
         document.getElementById("cPrice").innerText = totalcasePrice;

         const subTotal =  document.getElementById("subtotal").innerText;
         const sbTotal = parseFloat(subTotal);
         const SubTotal = sbTotal+59;
         document.getElementById("subtotal").innerText = SubTotal;

         const Total =  document.getElementById("total").innerText;
         const ToTal = parseFloat(Total);
         const TotaL = ToTal+59;
         document.getElementById("total").innerText = TotaL;

      })

      //Case minus Btn
      const cminusBtn = document.getElementById("caseMinus");
      cminusBtn.addEventListener("click",function(){
         const casequanti = document.getElementById("caseAmount").value;
         const casequantity = parseFloat(casequanti);
         const totalCase = casequantity - 1;
         document.getElementById("caseAmount").value = totalCase;
         if(caseAmount.value <= 0){
            caseAmount.value = 0;
         }

         const caseprice = document.getElementById("cPrice").innerText;
         const casePrice = parseFloat(caseprice);
         const totalCasePrice = casePrice - 59;
         document.getElementById("cPrice").innerText = totalCasePrice;  
         if(cPrice.innerText <= 0){
            cPrice.innerText = 0;
         }

         const subTotal =  document.getElementById("subtotal").innerText;
         const sbTotal = parseFloat(subTotal);
         const SubTotal = sbTotal-59;
         document.getElementById("subtotal").innerText = SubTotal;
         if(subtotal.innerText <= 0 || caseAmount.value <= 0){
            subtotal.innerText = mblPrice.innerText;
         }

         const Total =  document.getElementById("total").innerText;
         const ToTal = parseFloat(Total);
         const TotaL = ToTal-59;
         document.getElementById("total").innerText = TotaL;
         if(total.innerText <= 0 || caseAmount.value <= 0){
            total.innerText = mblPrice.innerText;
         } 
      })
   </script>

</body>

</html>
